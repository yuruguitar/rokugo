<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六郷ゆるギター教室</title>
<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: #111;
    color: #f5f5f5;
    line-height: 1.8;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.hero {
    width: 100%;
    border-radius: 16px;
    margin-bottom: 24px;
}

h1 {
    font-size: 2rem;
    margin-bottom: 8px;
}

h2 {
    margin-top: 36px;
    border-bottom: 1px solid #444;
    padding-bottom: 8px;
}

.card {
    background: #1b1b1b;
    padding: 20px;
    border-radius: 14px;
    margin-top: 16px;
}

.price {
    font-size: 1.1rem;
    font-weight: bold;
}

.button {
    display: inline-block;
    background: #d94b4b;
    color: white;
    padding: 14px 22px;
    border-radius: 12px;
    text-decoration: none;
    margin-top: 20px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    box-sizing: border-box;
}

button {
    background: #d94b4b;
    color: white;
    border: none;
    padding: 14px 22px;
    border-radius: 12px;
    margin-top: 12px;
    cursor: pointer;
}

.small {
    color: #aaa;
    font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="container">

<img src="main.png" class="hero">

<h1>六郷ゆるギター教室</h1>

<p>
初心者歓迎の個人ギターレッスンです。<br>
アコギ・エレキどちらもOK。<br>
「ギター買ったけど何すればいいかわからない」から、
「セッションやアドリブやってみたい！」までゆるく対応します。
</p>

<div class="card">
<h2>レッスン内容</h2>
<ul>
<li>弾き語り</li>
<li>コード・ストローク</li>
<li>アドリブ・耳コピ</li>
<li>音楽理論</li>
<li>エフェクター・機材相談</li>
<li>ギター調整・簡易リペア</li>
</ul>
</div>

<div class="card">
<h2>料金</h2>
<p class="price">初回1時間無料</p>
<p>2回目以降 1時間 1,000円〜</p>
<p class="small">木・土・日・祝中心 / 対面・オンライン対応</p>
</div>

<div class="card">
<h2>お問い合わせ</h2>

<form action="https://formsubmit.co/fercy0w0@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="六郷ゆるギター教室 お問い合わせ">

    <input type="text" name="name" placeholder="お名前" required>
    <input type="email" name="email" placeholder="メールアドレス" required>
    <textarea name="message" rows="6" placeholder="お問い合わせ内容"></textarea>

    <button type="submit">送信する</button>
</form>

<p class="small">
※送信後、確認メールが届きます。初回のみ認証が必要です。
</p>

</div>

</div>

</body>
</html>
